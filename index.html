<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Completo GED - 4 Materias</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-dark: #1a1a1a;
            --border-dark: #1a1a1a;
            --card-bg: #ffffff;
            
            /* Paleta Colorblock Oficial */
            --math-color: #ffda79;
            --rla-color: #ffabe7;
            --science-color: #81ecec;
            --social-color: #74b9ff;
            
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border: 4px solid var(--border-dark);
            padding: 20px;
            background: #ffffff;
            box-shadow: 6px 6px 0px var(--border-dark);
        }

        .header h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        /* Selectores de Materias (Tabs Estilo Colorblock) */
        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background: #ffffff;
            border: 4px solid var(--border-dark);
            padding: 15px 10px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.1s ease;
        }

        .tab-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px var(--border-dark);
        }

        /* Colores dinámicos al activar pestañas */
        #btn-matematicas.active { background-color: var(--math-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
        #btn-lenguaje.active { background-color: var(--rla-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
        #btn-ciencias.active { background-color: var(--science-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
        #btn-sociales.active { background-color: var(--social-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }

        /* Panel Principal del Quiz */
        .quiz-panel {
            background: var(--card-bg);
            border: 4px solid var(--border-dark);
            padding: 30px;
            box-shadow: 8px 8px 0px var(--border-dark);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--border-dark);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1rem;
        }

        .timer {
            color: var(--danger);
            background: #fee2e2;
            padding: 4px 10px;
            border: 2px solid var(--border-dark);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-line;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-btn {
            background: #ffffff;
            border: 3px solid var(--border-dark);
            padding: 15px 20px;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.1s ease;
        }

        .option-btn:hover:not([disabled]) {
            background: #fdfbf7;
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px var(--border-dark);
        }

        .option-btn.correct {
            background-color: var(--success) !important;
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--danger) !important;
            color: white;
        }

        .explanation-box {
            margin-top: 25px;
            padding: 20px;
            background: #f0fdf4;
            border: 3px solid var(--border-dark);
            box-shadow: 4px 4px 0px var(--border-dark);
            display: none;
            line-height: 1.5;
        }

        .actions-row {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .action-btn {
            background: #ffffff;
            border: 3px solid var(--border-dark);
            padding: 12px 25px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-dark);
        }

        .action-btn:hover:not([disabled]) {
            background: #f4f1ea;
        }

        .action-btn:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }

        .results-screen {
            text-align: center;
            padding: 20px 0;
        }

        .score-box {
            display: inline-block;
            padding: 20px 40px;
            border: 4px solid var(--border-dark);
            background: var(--math-color);
            font-size: 3rem;
            font-weight: 900;
            box-shadow: 6px 6px 0px var(--border-dark);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Simulador Oficial GED</h1>
            <p id="module-indicator">Módulo Activo: Razonamiento Matemático</p>
        </div>

        <!-- Pestañas de Navegación de Materias -->
        <div class="tabs">
            <button class="tab-btn active" id="btn-matematicas" onclick="changeSubject('matematicas')">Matemáticas</button>
            <button class="tab-btn" id="btn-lenguaje" onclick="changeSubject('lenguaje')">Artes del Lenguaje</button>
            <button class="tab-btn" id="btn-ciencias" onclick="changeSubject('ciencias')">Ciencias</button>
            <button class="tab-btn" id="btn-sociales" onclick="changeSubject('sociales')">Estudios Sociales</button>
        </div>

        <!-- Zona del Examen Centralizado -->
        <div class="quiz-panel">
            <div class="status-bar">
                <span id="question-counter">Pregunta 1 de 3</span>
                <span class="timer">⏱️ Tiempo: <span id="time-display">115:00</span></span>
            </div>

            <div id="quiz-playable-zone">
                <p class="question-text" id="question-text">Cargando reactivos oficiales...</p>
                <div class="options-list" id="options-container"></div>

                <div class="explanation-box" id="explanation-box">
                    <strong>Análisis del Reactivo:</strong> <span id="explanation-text"></span>
                </div>

                <div class="actions-row">
                    <button class="action-btn" id="hint-btn" onclick="triggerHint()">Ver Pista</button>
                    <button class="action-btn" id="next-btn" onclick="goToNextQuestion()" disabled>Siguiente Pregunta</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Base de datos integrada con las 4 materias oficiales, tiempos reales y preguntas prototipo reales
        const gedDatabase = {
            {
    name: "Razonamiento Matemático",
    officialTime: 6900, // 115 Minutos oficiales
    questions: [
        {
            q: "Un tanque de almacenamiento contiene 240 galones de agua. Si se vacía a una tasa constante de 6 galones por minuto, ¿cuál de las siguientes ecuaciones representa la cantidad de agua (W) que queda en el tanque después de 'm' minutos?",
            options: ["W = 240 + 6m", "W = 6m - 240", "W = 240 - 6m", "W = 240 / 6m"],
            correct: 2,
            hint: "El volumen inicial se reduce progresivamente conforme pasan los minutos.",
            exp: "Inicias con 240 galones. Al vaciarse, disminuye a razón de 6 galones por cada minuto transcurrido (6m). Por lo tanto, la ecuación lineal correcta es W = 240 - 6m."
        },
        {
            q: "Resuelve la siguiente inecuación para x:\n3x - 4 > 11",
            options: ["x > 5", "x > 2.33", "x < 5", "x > 7"],
            correct: 0,
            hint: "Despeja sumando 4 en ambos lados primero, luego divide entre 3.",
            exp: "Sumamos 4 a ambos lados: 3x > 15. Al dividir ambos términos por 3, obtenemos x > 5."
        },
        {
            q: "Un cilindro de almacenamiento de combustible tiene un radio base de 3 metros y una altura total de 10 metros. ¿Cuál es el volumen aproximado de este contenedor usando $\\pi \\approx 3.14$?",
            options: ["94.2 metros cúbicos", "282.6 metros cúbicos", "847.8 metros cúbicos", "188.4 metros cúbicos"],
            correct: 1,
            hint: "La fórmula para calcular el volumen de un cilindro es $V = \\pi r^2 h$.",
            exp: "Calculamos el área de la base: $3^2 = 9$. Luego multiplicamos por pi y la altura: $9 \\times 3.14 \\times 10 = 282.6\\text{ m}^3$."
        },
        {
            q: "Un anuncio publicitario digital generó 1,200 clics durante su primera semana. Si la tasa de conversión promedio es del 5%, ¿cuántas ventas o conversiones efectivas se obtuvieron?",
            options: ["12 conversiones", "24 conversiones", "60 conversiones", "120 conversiones"],
            correct: 2,
            hint: "Para encontrar el porcentaje, multiplica 1,200 por 0.05.",
            exp: "El 5% de 1,200 se calcula multiplicando $1200 \\times 0.05 = 60$ conversiones exitosas."
        },
        {
            q: "Simplifique la siguiente expresión algebraica combinando términos semejantes:\n$4x^2 - 3x + 5 - 2x^2 + 7x - 9$",
            options: [
                "$2x^2 + 4x - 4$",
                "$6x^2 + 10x + 14$",
                "$2x^2 - 4x - 4$",
                "$2x^4 + 4x^2 - 4$"
            ],
            correct: 0,
            hint: "Agrupa por separado los términos con $x^2$, los que tienen $x$ y los números independientes.",
            exp: "Operando términos comunes: $(4x^2 - 2x^2) = 2x^2$; $(-3x + 7x) = 4x$; $(5 - 9) = -4$. El resultado es $2x^2 + 4x - 4$."
        },
        {
            q: "Un triángulo rectángulo tiene una base de 6 centímetros y una altura de 8 centímetros. ¿Cuál es la longitud de su hipotenusa?",
            options: ["10 cm", "14 cm", "48 cm", "12 cm"],
            correct: 0,
            hint: "Utiliza el Teorema de Pitágoras: $a^2 + b^2 = c^2$.",
            exp: "Sumamos los cuadrados de los catetos: $6^2 + 8^2 = 36 + 64 = 100$. La raíz cuadrada de 100 es 10 cm."
        },
        {
            q: "El precio original de un curso digital es de $80. Si aplicas un cupón de descuento especial del 25%, ¿cuánto terminarás pagando finalmente por el producto?",
            options: ["$20", "$60", "$55", "$75"],
            correct: 1,
            hint: "Calcula el 25% de 80 y réstaselo al precio original, o calcula directamente el 75% de 80.",
            exp: "El descuento es del 25% ($80 \\times 0.25 = $20). Al restar el descuento al precio original ($80 - $20) obtenemos un costo final de $60."
        },
        {
            q: "Encuentra la pendiente ($m$) de la línea recta que pasa exactamente por los puntos coordenados $A(2, 4)$ y $B(5, 13)$ en el plano cartesiano.",
            options: ["m = 1.5", "m = 3", "m = 9", "m = 0.33"],
            correct: 1,
            hint: "La fórmula de la pendiente es $m = (y_2 - y_1) / (x_2 - x_1)$.",
            exp: "Sustituyendo los valores: $m = (13 - 4) / (5 - 2) = 9 / 3 = 3$. La pendiente es igual a 3."
        },
        {
            q: "Un analista de tráfico divide una lista de 400 prospectos en una razón de 3:1 entre tráfico orgánico y tráfico pagado. ¿Cuántos prospectos corresponden al grupo de tráfico orgánico?",
            options: ["100 prospectos", "300 prospectos", "200 prospectos", "133 prospectos"],
            correct: 1,
            hint: "La razón total consta de 4 partes (3 + 1 = 4). Divide 400 entre 4 partes y multiplica el resultado por 3.",
            exp: "Cada parte equivale a $400 / 4 = 100$. Al ser la relación 3 partes orgánicas, calculamos $100 \\times 3 = 300$ prospectos."
        },
        {
            q: "Resuelve el siguiente sistema de ecuaciones lineales para encontrar el valor correlativo de y:\n$x + y = 12$\n$x - y = 4$",
            options: ["y = 8", "y = 4", "y = 6", "y = 2"],
            correct: 1,
            hint: "Puedes sumar ambas ecuaciones de forma directa para eliminar la variable $y$ primero, o usar sustitución.",
            exp: "Sumando las ecuaciones: $2x = 16 \\rightarrow x = 8$. Sustituyendo en la primera ecuación: $8 + y = 12 \\rightarrow y = 4$."
        },
        {
            q: "Un conjunto de datos incluye las siguientes calificaciones obtenidas en una evaluación: 75, 80, 80, 85, 90, 95, 100. ¿Cuál es la mediana de estas puntuaciones?",
            options: ["85", "80", "86.4", "90"],
            correct: 0,
            hint: "La mediana es el valor central que divide el conjunto ordenado exactamente a la mitad.",
            exp: "Los datos ya se encuentran ordenados de menor a mayor. Al haber 7 elementos, el número que ocupa la posición central (la cuarta posición) es el 85."
        },
        {
            q: "Calcule la probabilidad de obtener un número par al lanzar un dado estándar balanceado de seis caras numeradas del 1 al 6.",
            options: ["1/6", "1/2", "1/3", "2/3"],
            correct: 1,
            hint: "Determina cuántos números pares hay en el dado (2, 4, 6) en relación al total de caras posibles.",
            exp: "Hay 3 casos favorables (2, 4, 6) de un total de 6 opciones posibles. La fracción $3/6$ se simplifica exactamente a $1/2$ (50%)."
        },
        {
            q: "Si la base de un rectángulo se duplica en longitud y su altura se reduce exactamente a la mitad, ¿cómo cambia su área original?",
            options: [
                "El área se duplica.",
                "El área se reduce a la cuarta parte.",
                "El área permanece exactamente igual.",
                "El área aumenta cuatro veces."
            ],
            correct: 2,
            hint: "Fórmula del área: $A = b \\cdot h$. Haz la sustitución matemática usando $2b$ y $h/2$.",
            exp: "Nueva área = $(2b) \\times (h / 2) = 2/2 \\cdot (b \\cdot h) = b \\cdot h$. Las operaciones se compensan, manteniendo el área idéntica."
        },
        {
            q: "Un contratista cobra una tarifa fija de $50 por la visita técnica a domicilio, más $30 adicionales por cada hora de mano de obra laborada. Si el cobro total facturado fue de $170, ¿cuántas horas trabajó?",
            options: ["3 horas", "4 horas", "5 horas", "2.5 horas"],
            correct: 1,
            hint: "Plantea la ecuación lineal $30h + 50 = 170$ y despeja la variable de las horas ($h$).",
            exp: "Restamos el costo fijo del total: $170 - 50 = 120$. Luego dividimos el saldo entre la tarifa por hora: $120 / 30 = 4$ horas."
        },
        {
            q: "Una caja metálica cúbica tiene una arista que mide exactamente 5 centímetros por lado. ¿Cuál es el área superficial total de las seis caras exteriores combinadas de la caja?",
            options: ["25 cm²", "125 cm²", "150 cm²", "60 cm²"],
            correct: 2,
            hint: "Calcula el área de una sola cara cuadrada ($lado \\times lado$) y luego multiplica ese resultado por el total de caras (6).",
            exp: "El área de una cara es $5 \\times 5 = 25\\text{ cm}^2$. Al tener un cubo 6 caras uniformes, el área total corresponde a $25 \\times 6 = 150\\text{ cm}^2$."
        },
        {
            q: "Encuentre las soluciones reales o raíces de la siguiente ecuación cuadrática factorizable:\n$x^2 - 5x + 6 = 0$",
            options: ["x = -2, x = -3", "x = 2, x = 3", "x = 1, x = 6", "x = 5, x = 6"],
            correct: 1,
            hint: "Factoriza la expresión buscando dos números que multiplicados den +6 y sumados den -5.",
            exp: "La ecuación se factoriza como $(x - 2)(x - 3) = 0$. Al igualar cada binomio a cero, obtenemos las soluciones $x = 2$ y $x = 3$."
        },
        {
            q: "Una tienda de comercio electrónico compra un artículo a precio de proveedor por $20 y decide venderlo al público marcando un precio de venta de $25. ¿Cuál es el porcentaje de ganancia o margen sobre el costo de adquisición?",
            options: ["5%", "20%", "25%", "15%"],
            correct: 2,
            hint: "La ganancia neta es de $5. Divide esa ganancia entre el costo original de $20 y conviértelo a porcentaje.",
            exp: "Dividiendo el beneficio sobre la inversión base: $5 / 20 = 0.25$. Multiplicando por 100 obtenemos un margen exacto del 25%."
        },
        {
            q: "¿Cuál es el valor numérico obtenido al evaluar la siguiente función exponencial cuando el tiempo es $t = 3$?\n$f(t) = 5 \\cdot 2^t$",
            options: ["30", "40", "125", "15"],
            correct: 1,
            hint: "Aplica primero la potencia $2^3$ siguiendo el orden jerárquico operacional y luego multiplica por 5.",
            exp: "Primero se calcula el exponente de la base: $2^3 = 2 \\times 2 \\times 2 = 8$. Finalmente, multiplicamos el factor: $5 \\times 8 = 40$."
        },
        {
            q: "Un mapa de carreteras utiliza una escala de representación donde 2 centímetros en el papel equivalen a 15 kilómetros reales de terreno. Si la distancia medida en el mapa entre dos poblados es de 8 centímetros, ¿cuál es la distancia real en kilómetros?",
            options: ["30 km", "60 km", "120 km", "45 km"],
            correct: 1,
            hint: "Plantea una regla de tres simple directa: si 2 cm son 15 km, entonces 8 cm representan 'x' km.",
            exp: "Multiplicamos cruzado y dividimos: $(8 \\times 15) / 2 = 120 / 2 = 60$ kilómetros reales."
        },
        {
            q: "Calcule el perímetro aproximado de una alfombra circular cuyo diámetro total mide exactamente 6 metros. (Utilice $\\pi \\approx 3.14$)",
            options: ["18.84 metros", "9.42 metros", "28.26 metros", "37.68 metros"],
            correct: 0,
            hint: "La fórmula para el perímetro o circunferencia es $C = \\pi \\cdot d$, donde $d$ es el diámetro.",
            exp: "Sustituyendo el diámetro directo en la fórmula de la circunferencia tenemos: $3.14 \\times 6 = 18.84$ metros de perímetro."
        },
        {
            q: "Si la media aritmética de cuatro números es exactamente 20, y tres de esos números son 15, 20 y 25, ¿cuál es el valor del cuarto número faltante?",
            options: ["10", "20", "30", "15"],
            correct: 1,
            hint: "Si la media de 4 números es 20, la suma acumulada de todos ellos debe dar un total de 80 ($4 \\times 20$).",
            exp: "La suma requerida es $4 \\times 20 = 80$. Sumando los tres valores conocidos: $15 + 20 + 25 = 60$. El número faltante es $80 - 60 = 20$."
        },
        {
            q: "Un inversionista coloca un capital de $1,000 en una cuenta de ahorros que rinde un interés simple del 6% anual. ¿Cuánto dinero total habrá acumulado en la cuenta después de transcurrir 3 años sin retiros?",
            options: ["$1,060", "$1,180", "$1,216", "$1,006"],
            correct: 1,
            hint: "Calcula el interés de un año ($1,000 \\times 0.06$), multiplícalo por 3 años y súmaselo al capital inicial.",
            exp: "El interés ganado por año es de $60. En 3 años el interés acumulado es de $180 ($60 \\times 3$). El monto total es $1,000 + $180 = $1,180."
        },
        {
            q: "Identifique el valor de la incógnita $x$ que satisface la siguiente ecuación lineal con fracciones:\n$x / 4 + 3 = 7$",
            options: ["x = 16", "x = 4", "x = 1", "x = 40"],
            correct: 0,
            hint: "Resta 3 en ambos miembros de la ecuación antes de multiplicar por 4 para despejar completamente la variable.",
            exp: "Restando 3 en ambos lados: $x / 4 = 4$. Al pasar el 4 multiplicando al miembro derecho, obtenemos un valor de $x = 16$."
        },
        {
            q: "¿Cuál es el área total de un terreno plano que tiene forma geométrica de trapecio, si sus bases miden 12 y 8 metros respectivamente, y su altura perpendicular es de 5 metros?",
            options: ["100 metros cuadrados", "50 metros cuadrados", "48 metros cuadrados", "25 metros cuadrados"],
            correct: 1,
            hint: "La fórmula para el área de un trapecio es $A = \\frac{(B + b) \\cdot h}{2}$.",
            exp: "Sumamos las bases: $12 + 8 = 20$. Multiplicamos por la altura: $20 \\times 5 = 100$. Dividiendo el resultado por 2 obtenemos 50 metros cuadrados."
        },
        {
            q: "En una fábrica de empaques, una máquina automatizada produce 15 cajas de cartón cada 45 segundos. ¿A qué tasa constante produce cajas expresada por minuto?",
            options: ["20 cajas por minuto", "30 cajas por minuto", "45 cajas por minuto", "15 cajas por minuto"],
            correct: 0,
            hint: "Un minuto contiene 60 segundos. Divide 60 entre 45 y multiplica por 15, o usa una proporción simple.",
            exp: "La tasa de producción es de $15 / 45 = 1/3$ de caja por segundo. En un minuto completo ($60\\text{ segundos}$): $60 \\times (1/3) = 20$ cajas."
        },
        {
            q: "Una encuesta aplicada a 200 personas reveló que a 120 de ellas les gusta consumir café por las mañanas. ¿Qué porcentaje del grupo encuestado representa a los consumidores de café?",
            options: ["40%", "50%", "60%", "120%"],
            correct: 2,
            hint: "Divide el número de respuestas favorables entre la población muestra total y multiplica por 100.",
            exp: "Haciendo la división porcentual: $120 / 200 = 0.60$. Al multiplicar por 100 obtenemos que equivale exactamente al 60%."
        },
        {
            q: "El volumen de un contenedor prismático rectangular (caja) es de 120 metros cúbicos. Si se sabe que el largo mide 6 metros y el ancho mide 4 metros, ¿cuánto mide la altura del contenedor?",
            options: ["5 metros", "10 metros", "2 metros", "24 metros"],
            correct: 0,
            hint: "La fórmula del volumen de un prisma rectangular es $V = largo \\times ancho \\times altura$.",
            exp: "El área de la base es $6 \\times 4 = 24\\text{ m}^2$. Sabiendo que el volumen total es 120, dividimos el volumen entre el área base: $120 / 24 = 5$ metros."
        },
        {
            q: "Si la razón matemática entre dos números enteros es 5:2 y el número menor es 14, ¿cuál es el valor numérico asignado al número mayor?",
            options: ["35", "28", "70", "21"],
            correct: 0,
            hint: "Establece la proporción: $5 / 2 = x / 14$ y despeja el valor de la incógnita multiplicando cruzado.",
            exp: "Despejando la proporción directa: $x = (5 \\times 14) / 2$. Al resolver la operación obtenemos $70 / 2 = 35$."
        },
        {
            q: "Graficando la función lineal $y = -2x + 4$, ¿en qué punto cartesiano cruza la recta de forma exacta el eje vertical de las ordenadas (eje Y)?",
            options: ["(0, -2)", "(0, 4)", "(2, 0)", "(-2, 4)"],

        let activeSubject = 'matematicas';
        let questionIdx = 0;
        let cumulativeScore = 0;
        let countdownTimer = null;
        let secondsRemaining = 0;
        let isQuestionAnswered = false;

        function loadQuizState() {
            questionIdx = 0;
            cumulativeScore = 0;
            isQuestionAnswered = false;
            secondsRemaining = gedDatabase[activeSubject].officialTime;
            
            document.getElementById('next-btn').disabled = true;
            document.getElementById('next-btn').textContent = "Siguiente Pregunta";
            document.getElementById('explanation-box').style.display = "none";
            
            clearInterval(countdownTimer);
            initTimerLogic();
            displayCurrentQuestion();
        }

        function changeSubject(subjectKey) {
            activeSubject = subjectKey;
            
            // Actualizar pestañas
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${subjectKey}`).classList.add('active');
            
            // Actualizar título informativo
            document.getElementById('module-indicator').textContent = `Módulo Activo: ${gedDatabase[subjectKey].name}`;
            
            loadQuizState();
        }

        function initTimerLogic() {
            refreshTimerText();
            countdownTimer = setInterval(() => {
                secondsRemaining--;
                refreshTimerText();
                if(secondsRemaining <= 0) {
                    clearInterval(countdownTimer);
                    terminateQuiz(true);
                }
            }, 1000);
        }

        function refreshTimerText() {
            const mins = Math.floor(secondsRemaining / 60);
            const secs = secondsRemaining % 60;
            document.getElementById('time-display').textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function displayCurrentQuestion() {
            const subjectQuestions = gedDatabase[activeSubject].questions;
            const currentData = subjectQuestions[questionIdx];
            
            document.getElementById('question-counter').textContent = `Pregunta ${questionIdx + 1} de ${subjectQuestions.length}`;
            document.getElementById('question-text').textContent = currentData.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            document.getElementById('explanation-box').style.display = "none";
            isQuestionAnswered = false;
            document.getElementById('next-btn').disabled = true;

            currentData.options.forEach((optionText, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = optionText;
                button.onclick = () => evaluateSelection(index, button);
                optionsContainer.appendChild(button);
            });
        }

        function evaluateSelection(selectedIndex, targetButton) {
            if(isQuestionAnswered) return;
            isQuestionAnswered = true;
            
            const subjectQuestions = gedDatabase[activeSubject].questions;
            const currentData = subjectQuestions[questionIdx];
            const allOptionButtons = document.querySelectorAll('.option-btn');
            
            allOptionButtons.forEach(btn => btn.disabled = true);

            if(selectedIndex === currentData.correct) {
                targetButton.classList.add('correct');
                cumulativeScore++;
            } else {
                targetButton.classList.add('wrong');
                allOptionButtons[currentData.correct].classList.add('correct');
            }

            document.getElementById('explanation-text').textContent = currentData.exp;
            document.getElementById('explanation-box').style.display = "block";
            
            if(questionIdx === subjectQuestions.length - 1) {
                document.getElementById('next-btn').textContent = "Ver Resultados del Módulo";
            }
            document.getElementById('next-btn').disabled = false;
        }

        function triggerHint() {
            const currentData = gedDatabase[activeSubject].questions[questionIdx];
            alert(`💡 PISTA:\n${currentData.hint}`);
        }

        function goToNextQuestion() {
            const subjectQuestions = gedDatabase[activeSubject].questions;
            if(questionIdx < subjectQuestions.length - 1) {
                questionIdx++;
                displayCurrentQuestion();
            } else {
                clearInterval(countdownTimer);
                terminateQuiz(false);
            }
        }

        function terminateQuiz(endedByTimeout) {
            const totalQuestions = gedDatabase[activeSubject].questions.length;
            const finalPercentage = Math.round((cumulativeScore / totalQuestions) * 100);
            
            let statusMessage = finalPercentage >= 70 ? "¡Excelente! Estás demostrando un nivel óptimo para aprobar este módulo oficial." : "Te recomendamos revisar los análisis de respuesta para reforzar tus puntos débiles.";
            if(endedByTimeout) statusMessage = "⏰ ¡El tiempo límite oficial establecido ha concluido!";

            document.getElementById('quiz-playable-zone').innerHTML = `
                <div class="results-screen">
                    <h2>Módulo Concluido</h2>
                    <p style="margin: 15px 0; font-size: 1.1rem; color: #4b5563;">${statusMessage}</p>
                    <div class="score-box">${finalPercentage}%</div>
                    <p style="font-size: 1.1rem; font-weight: 600;">Puntuación final: Respondiste correctamente ${cumulativeScore} de ${totalQuestions} reactivos.</p>
                    <button class="action-btn" style="margin-top: 25px; padding: 15px 30px; background-color: #1a1a1a; color: white;" onclick="loadQuizState()">Reiniciar Módulo</button>
                </div>
            `;
        }

        // Carga automática inicial al abrir el navegador
        window.onload = loadQuizState;
    </script>
</body>
</html>
