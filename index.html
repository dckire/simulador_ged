<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Oficial de Práctica GED</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-dark: #0369a1;
            --success: #22c55e;
            --danger: #ef4444;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        h1 {
            color: var(--primary-dark);
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: #e2e8f0;
            border: none;
            padding: 12px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.3s ease;
            text-align: center;
            font-size: 0.9rem;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .timer {
            color: var(--danger);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .question-box {
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-btn:hover:not([disabled]) {
            background: #f0f9ff;
            border-color: var(--primary);
        }

        .option-btn.correct {
            background: #dcfce7;
            border-color: var(--success);
            color: #14532d;
        }

        .option-btn.wrong {
            background: #fee2e2;
            border-color: var(--danger);
            color: #7f1d1d;
        }

        .explanation {
            margin-top: 20px;
            padding: 15px 20px;
            background: #eff6ff;
            border-left: 4px solid var(--primary);
            border-radius: 4px;
            display: none;
            line-height: 1.5;
        }

        .nav-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .action-btn {
            background: var(--primary-dark);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: var(--primary);
        }

        .action-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        .results-screen {
            text-align: center;
            padding: 20px 0;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: #f0f9ff;
            border: 5px solid var(--primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 20px auto;
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-dark);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Simulador Práctica GED</h1>
        <p class="subtitle">Selecciona una materia para iniciar el examen con tiempo real</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchSubject('matematicas')">Matemáticas</button>
            <button class="tab-btn" onclick="switchSubject('lenguaje')">Artes del Lenguaje</button>
            <button class="tab-btn" onclick="switchSubject('ciencias')">Ciencias</button>
            <button class="tab-btn" onclick="switchSubject('sociales')">Estudios Sociales</button>
        </div>

        <div class="status-bar">
            <span id="question-counter">Pregunta 1 de 3</span>
            <span class="timer">⏱️ <span id="time-display">10:00</span></span>
        </div>

        <div id="quiz-zone">
            <div class="question-box">
                <p class="question-text" id="question-text">Cargando pregunta...</p>
                <div class="options-list" id="options-container">
                    </div>
            </div>

            <div class="explanation" id="explanation-box">
                <strong>Explicación:</strong> <span id="explanation-text"></span>
            </div>

            <div class="nav-actions">
                <button class="action-btn" id="hint-btn" onclick="showHint()">Ver Pista</button>
                <button class="action-btn" id="next-btn" onclick="nextQuestion()" disabled>Siguiente Pregunta</button>
            </div>
        </div>
    </div>

    <script>
        // Banco de preguntas estructurado por materia (Estilo oficial del GED)
        const examData = {
            matematicas: {
                time: 600, // 10 minutos
                questions: [
                    {
                        q: "Un tanque de almacenamiento contiene 240 galones de agua. Si se vacía a una tasa constante de 6 galones por minuto, ¿cuál de las siguientes ecuaciones representa la cantidad de agua (W) que queda en el tanque después de 'm' minutos?",
                        options: ["W = 240 + 6m", "W = 6m - 240", "W = 240 - 6m", "W = 240 / 6m"],
                        correct: 2,
                        hint: "El tanque empieza lleno (240 positivo) y va perdiendo agua (-), perdiendo 6 galones por cada minuto multiplicador.",
                        exp: "La cantidad inicial es 240 galones. Al vaciarse, restamos el flujo por minuto: 6 multiplicado por los minutos (6m). Por lo tanto, W = 240 - 6m."
                    },
                    {
                        q: "Resuelve la siguiente inecuación lineal para x: 3x - 4 > 11",
                        options: ["x > 5", "x > 2.33", "x < 5", "x > 7"],
                        correct: 0,
                        hint: "Pasa el -4 al otro lado sumando (+4) y luego divide el resultado entre 3.",
                        exp: "Sumamos 4 a ambos lados: 3x > 15. Dividimos entre 3: x > 15/3, lo que resulta en x > 5."
                    },
                    {
                        q: "Un triángulo rectángulo tiene una base de 8 cm y una altura de 15 cm. ¿Cuál es la longitud de su hipotenusa? (Usa el Teorema de Pitágoras: a² + b² = c²)",
                        options: ["23 cm", "17 cm", "289 cm", "12 cm"],
                        correct: 1,
                        hint: "Eleva 8 y 15 al cuadrado, súmalos y luego sácale la raíz cuadrada al resultado final.",
                        exp: "8² + 15² = 64 + 225 = 289. La raíz cuadrada de 289 es 17 cm."
                    }
                ]
            },
            lenguaje: {
                time: 600,
                questions: [
                    {
                        q: "Lee el siguiente fragmento: 'El uso generalizado de vehículos eléctricos no solo mitiga la emisión de gases de invernadero, sino que impulsa la innovación tecnológica en almacenamiento de energía.' ¿Cuál es el argumento principal del autor?",
                        options: ["Los autos eléctricos son demasiado caros para el público.", "Los vehículos eléctricos ofrecen beneficios ecológicos y tecnológicos.", "La innovación en baterías está completamente estancada.", "Los gases de invernadero no se pueden detener."],
                        correct: 1,
                        hint: "Busca la opción que resuma los dos puntos positivos mencionados en la oración corta.",
                        exp: "El texto vincula explícitamente la mitigación de gases (ecología) con el desarrollo de almacenamiento energético (tecnología)."
                    },
                    {
                        q: "Elige la opción que corrija correctamente el error gramatical de la frase: 'Ayer, los soldados marchó rápidamente hacia la base.'",
                        options: ["Ayer, los soldados marcharon rápidamente hacia la base.", "Ayer, el soldado marcharon rápidamente hacia la base.", "Ayer, los soldados marchar rápidamente hacia la base.", "No requiere cambios."],
                        correct: 0,
                        hint: "El sujeto 'los soldados' es plural, por lo que el verbo debe coincidir en plural.",
                        exp: "Para mantener la concordancia de número entre el sujeto plural ('los soldados') y el verbo en pasado, se debe utilizar 'marcharon'."
                    }
                ]
            },
            ciencias: {
                time: 600,
                questions: [
                    {
                        q: "En un experimento genético con plantas, el alelo para flores rojas (R) es dominante sobre el alelo para flores blancas (r). Si se cruzan dos plantas heterocigotas (Rr x Rr), ¿qué porcentaje de la descendencia se espera que tenga flores blancas (rr)?",
                        options: ["0%", "25%", "50%", "75%"],
                        correct: 1,
                        hint: "Haz un cuadro de Punnett de 2x2. Solo las plantas con combinación 'rr' serán blancas.",
                        exp: "El cruce produce: RR (25%), Rr (50%) y rr (25%). Al ser 'rr' el único recesivo que produce flores blancas, la probabilidad es del 25%."
                    },
                    {
                        q: "Un científico observa que al calentar un gas en un contenedor cerrado herméticamente y rígido, la presión aumenta. ¿Cuál es la variable independiente en este experimento?",
                        options: ["La presión del gas", "La temperatura (calor aplicado)", "El volumen del contenedor", "El tipo de gas utilizado"],
                        correct: 1,
                        hint: "La variable independiente es aquella que el científico manipula o cambia directamente para ver qué pasa.",
                        exp: "El experimentador modifica directamente la temperatura aplicando calor; el aumento de presión es la consecuencia (variable dependiente)."
                    }
                ]
            },
            sociales: {
                time: 600,
                questions: [
                    {
                        q: "¿Qué sistema de gobierno se caracteriza por una división clara de poderes entre el gobierno nacional central y los gobiernos estatales o provinciales?",
                        options: ["Monarquía Absoluta", "Federalismo", "Dictadura Centralizada", "Anarquía"],
                        correct: 1,
                        hint: "Es el sistema utilizado en países como Estados Unidos o México, donde los estados tienen sus propias leyes además de las leyes nacionales.",
                        exp: "El federalismo distribuye el poder gubernamental de manera compartida y soberana entre una estructura centralizada y entidades regionales autónomas."
                    },
                    {
                        q: "La rama del gobierno encargada principalmente de interpretar las leyes y asegurar que coincidan con la Constitución es:",
                        options: ["La Rama Ejecutiva", "La Rama Legislativa", "La Rama Judicial (Las Cortes)", "La Rama Militar"],
                        correct: 2,
                        hint: "Está compuesta por los jueces y la Corte Suprema de Justicia.",
                        exp: "La rama judicial tiene como mandato constitucional exclusivo interpretar las leyes en disputas legales y evaluar su constitucionalidad."
                    }
                ]
            }
        };

        let currentSubject = 'matematicas';
        let currentQuestionIdx = 0;
        let score = 0;
        let timerInterval = null;
        let timeLeft = 0;
        let answered = false;

        function initExam() {
            currentQuestionIdx = 0;
            score = 0;
            answered = false;
            timeLeft = examData[currentSubject].time;
            
            document.getElementById('next-btn').disabled = true;
            document.getElementById('explanation-box').style.display = "none";
            
            clearInterval(timerInterval);
            startTimer();
            renderQuestion();
        }

        function switchSubject(subjectKey) {
            currentSubject = subjectKey;
            
            // Actualizar diseño de botones de pestañas
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.toLowerCase().includes(subjectKey.substring(0,5))) {
                    btn.classList.add('active');
                }
            });

            initExam();
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishExam(true);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('time-display').textContent = 
                `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function renderQuestion() {
            const currentQuestions = examData[currentSubject].questions;
            const qData = currentQuestions[currentQuestionIdx];
            
            document.getElementById('question-counter').textContent = `Pregunta ${currentQuestionIdx + 1} de ${currentQuestions.length}`;
            document.getElementById('question-text').textContent = qData.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            document.getElementById('explanation-box').style.display = "none";
            answered = false;
            document.getElementById('next-btn').disabled = true;

            qData.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => selectOption(idx, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedIndex, clickedBtn) {
            if(answered) return;
            answered = true;
            
            const qData = examData[currentSubject].questions[currentQuestionIdx];
            const buttons = document.querySelectorAll('.option-btn');
            
            buttons.forEach((btn) => btn.disabled = true);

            if(selectedIndex === qData.correct) {
                clickedBtn.classList.add('correct');
                score++;
            } else {
                clickedBtn.classList.add('wrong');
                buttons[qData.correct].classList.add('correct');
            }

            // Mostrar retroalimentación pedagógica instantánea
            document.getElementById('explanation-text').textContent = qData.exp;
            document.getElementById('explanation-box').style.display = "block";
            document.getElementById('next-btn').disabled = false;
        }

        function showHint() {
            const qData = examData[currentSubject].questions[currentQuestionIdx];
            alert(`💡 PISTA:\n${qData.hint}`);
        }

        function nextQuestion() {
            const currentQuestions = examData[currentSubject].questions;
            if(currentQuestionIdx < currentQuestions.length - 1) {
                currentQuestionIdx++;
                renderQuestion();
            } else {
                clearInterval(timerInterval);
                finishExam(false);
            }
        }

        function finishExam(timeout) {
            const currentQuestions = examData[currentSubject].questions;
            const total = currentQuestions.length;
            const percentage = Math.round((score / total) * 100);
            
            let feedbackMsg = percentage >= 70 ? "¡Excelente trabajo! Pasarías el GED con este ritmo." : "Sigue repasando los conceptos base. ¡Tú puedes!";
            if(timeout) feedbackMsg = "⏰ ¡Se acabó el tiempo asignado para este módulo!";

            document.getElementById('quiz-zone').innerHTML = `
                <div class="results-screen">
                    <h2>Módulo Completado</h2>
                    <p style="margin: 10px 0; color:var(--text-light);">${feedbackMsg}</p>
                    <div class="score-circle">
                        <span>${percentage}%</span>
                        <span style="font-size:0.8rem; font-weight:normal; color:var(--text-light)">Correctas</span>
                    </div>
                    <p>Acertaste <strong>${score}</strong> de un total de <strong>${total}</strong> preguntas.</p>
                    <button class="action-btn" style="margin-top:25px;" onclick="location.reload()">Tomar otro examen</button>
                </div>
            `;
        }

        // Arrancar el simulador al abrir la página
        window.onload = initExam;
    </script>
</body>
</html>
