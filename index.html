<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Completo GED - 4 Materias</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-dark: #1a1a1a;
            --border-dark: #1a1a1a;
            --card-bg: #ffffff;
            
            /* Paleta Colorblock Oficial */
            --math-color: #ffda79;
            --rla-color: #ffabe7;
            --science-color: #81ecec;
            --social-color: #74b9ff;
            
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border: 4px solid var(--border-dark);
            padding: 20px;
            background: #ffffff;
            box-shadow: 6px 6px 0px var(--border-dark);
        }

        .header h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        /* Selectores de Materias (Tabs Estilo Colorblock) */
        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background: #ffffff;
            border: 4px solid var(--border-dark);
            padding: 15px 10px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.1s ease;
        }

        .tab-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px var(--border-dark);
        }

        /* Colores dinámicos al activar pestañas */
        #btn-matematicas.active { background-color: var(--math-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
        #btn-lenguaje.active { background-color: var(--rla-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
        #btn-ciencias.active { background-color: var(--science-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
        #btn-sociales.active { background-color: var(--social-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }

        /* Panel Principal del Quiz */
        .quiz-panel {
            background: var(--card-bg);
            border: 4px solid var(--border-dark);
            padding: 30px;
            box-shadow: 8px 8px 0px var(--border-dark);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--border-dark);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1rem;
        }

        .timer {
            color: var(--danger);
            background: #fee2e2;
            padding: 4px 10px;
            border: 2px solid var(--border-dark);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-line;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-btn {
            background: #ffffff;
            border: 3px solid var(--border-dark);
            padding: 15px 20px;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.1s ease;
        }

        .option-btn:hover:not([disabled]) {
            background: #fdfbf7;
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px var(--border-dark);
        }

        .option-btn.correct {
            background-color: var(--success) !important;
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--danger) !important;
            color: white;
        }

        .explanation-box {
            margin-top: 25px;
            padding: 20px;
            background: #f0fdf4;
            border: 3px solid var(--border-dark);
            box-shadow: 4px 4px 0px var(--border-dark);
            display: none;
            line-height: 1.5;
        }

        .actions-row {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .action-btn {
            background: #ffffff;
            border: 3px solid var(--border-dark);
            padding: 12px 25px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-dark);
        }

        .action-btn:hover:not([disabled]) {
            background: #f4f1ea;
        }

        .action-btn:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }

        .results-screen {
            text-align: center;
            padding: 20px 0;
        }

        .score-box {
            display: inline-block;
            padding: 20px 40px;
            border: 4px solid var(--border-dark);
            background: var(--math-color);
            font-size: 3rem;
            font-weight: 900;
            box-shadow: 6px 6px 0px var(--border-dark);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Simulador Oficial GED</h1>
            <p id="module-indicator">Módulo Activo: Razonamiento Matemático</p>
        </div>

        <!-- Pestañas de Navegación de Materias -->
        <div class="tabs">
            <button class="tab-btn active" id="btn-matematicas" onclick="changeSubject('matematicas')">Matemáticas</button>
            <button class="tab-btn" id="btn-lenguaje" onclick="changeSubject('lenguaje')">Artes del Lenguaje</button>
            <button class="tab-btn" id="btn-ciencias" onclick="changeSubject('ciencias')">Ciencias</button>
            <button class="tab-btn" id="btn-sociales" onclick="changeSubject('sociales')">Estudios Sociales</button>
        </div>

        <!-- Zona del Examen Centralizado -->
        <div class="quiz-panel">
            <div class="status-bar">
                <span id="question-counter">Pregunta 1 de 3</span>
                <span class="timer">⏱️ Tiempo: <span id="time-display">115:00</span></span>
            </div>

            <div id="quiz-playable-zone">
                <p class="question-text" id="question-text">Cargando reactivos oficiales...</p>
                <div class="options-list" id="options-container"></div>

                <div class="explanation-box" id="explanation-box">
                    <strong>Análisis del Reactivo:</strong> <span id="explanation-text"></span>
                </div>

                <div class="actions-row">
                    <button class="action-btn" id="hint-btn" onclick="triggerHint()">Ver Pista</button>
                    <button class="action-btn" id="next-btn" onclick="goToNextQuestion()" disabled>Siguiente Pregunta</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Base de datos integrada con las 4 materias oficiales, tiempos reales y preguntas prototipo reales
        const gedDatabase = {
            matematicas: {
                name: "Razonamiento Matemático",
                officialTime: 6900, // 115 Minutos oficiales
                questions: [
                    {
                        q: "Un tanque de almacenamiento contiene 240 galones de agua. Si se vacía a una tasa constante de 6 galones por minuto, ¿cuál de las siguientes ecuaciones representa la cantidad de agua (W) que queda en el tanque después de 'm' minutos?",
                        options: ["W = 240 + 6m", "W = 6m - 240", "W = 240 - 6m", "W = 240 / 6m"],
                        correct: 2,
                        hint: "El volumen inicial se reduce progresivamente conforme pasan los minutos.",
                        exp: "Inicias con 240 galones. Al vaciarse, disminuye a razón de 6 galones por cada minuto transcurrido (6m). Por lo tanto, la ecuación lineal correcta es W = 240 - 6m."
                    },
                    {
                        q: "Resuelve la siguiente inecuación para x:\n3x - 4 > 11",
                        options: ["x > 5", "x > 2.33", "x < 5", "x > 7"],
                        correct: 0,
                        hint: "Despeja sumando 4 en ambos lados primero, luego divide entre 3.",
                        exp: "Sumamos 4 a ambos lados: 3x > 15. Al dividir ambos términos por 3, obtenemos x > 5."
                    }
                ]
            },
            lenguaje: {
                name: "Artes del Lenguaje (RLA)",
                officialTime: 9000, // 150 Minutos oficiales
                questions: [
                    {
                        q: "Lea el siguiente fragmento:\n'La adopción acelerada del comercio electrónico no solo ha transformado los hábitos de consumo masivo, sino que también ha obligado a las empresas de logística tradicional a reinventar sus cadenas de distribución.'\n\n¿Cuál es la idea principal del autor?",
                        options: [
                            "El e-commerce transformó el consumo masivo e impulsó la reestructuración logística.",
                            "Las empresas tradicionales están destinadas a la quiebra absoluta.",
                            "Las entregas en menos de 24 horas son insostenibles económicamente.",
                            "Los consumidores prefieren evitar las tiendas físicas por comodidad."
                        ],
                        correct: 0,
                        hint: "Busca la opción que resuma de forma global los dos efectos mencionados en el fragmento.",
                        exp: "El texto abarca de forma directa dos elementos entrelazados: la transformación del consumo y la obligada reinvención de las cadenas logísticas de distribución."
                    },
                    {
                        q: "Seleccione la opción que corrija los errores de concordancia de la siguiente frase:\n'El grupo de ingenieros, luego de revisar los planos, concluyeron que el suelo era inestables.'",
                        options: [
                            "El grupo de ingenieros, luego de revisar los planos, concluyeron que el suelo era inestables.",
                            "El grupo de ingenieros, luego de revisar los planos, concluyó que el suelo era inestable.",
                            "El grupo de ingenieros luego de revisar los planos concluyeron que el suelo era inestable.",
                            "El grupo de ingenieros, luego de revisar los planos, concluyó que el suelo era inestables."
                        ],
                        correct: 1,
                        hint: "El sujeto principal es 'El grupo' (singular) y el adjetivo debe calificar a 'suelo' (singular).",
                        exp: "'El grupo' es un sujeto colectivo singular, requiere el verbo 'concluyó'. Asimismo, el adjetivo 'inestable' debe concordar en singular con 'suelo'."
                    }
                ]
            },
            ciencias: {
                name: "Ciencias",
                officialTime: 5400, // 90 Minutos oficiales
                questions: [
                    {
                        q: "Un científico quiere probar la efectividad de un nuevo fertilizante en el crecimiento de plantas de maíz. Coloca 50 plantas bajo el sol con el nuevo fertilizante y otras 50 plantas exactamente bajo las mismas condiciones de sol y agua, pero usando fertilizante común.\n\nEn este experimento, ¿cuál es la variable independiente?",
                        options: [
                            "La cantidad de agua recibida.",
                            "La altura final alcanzada por las plantas.",
                            "El tipo de fertilizante utilizado.",
                            "La cantidad de luz solar diaria."
                        ],
                        correct: 2,
                        hint: "La variable independiente es el factor que el experimentador cambia intencionalmente para ver qué pasa.",
                        exp: "El tipo de fertilizante es la variable independiente porque es el elemento modificado a propósito por el científico para evaluar sus impactos diferenciales."
                    },
                    {
                        q: "En genética, si cruzamos dos plantas heterocigotas de flores rojas (Rr), donde el alelo R (rojo) es dominante sobre el alelo r (blanco), ¿cuál es la probabilidad matemática de obtener una planta de flores blancas (rr)?",
                        options: ["0%", "25%", "50%", "75%"],
                        correct: 1,
                        hint: "Realiza el Cuadro de Punnett combinando Rr x Rr.",
                        exp: "La cruza genera los genotipos: 25% RR (rojo), 50% Rr (rojo) y 25% rr (blanco). Al ser el color blanco recesivo puro, tiene un 25% (1 de 4) de probabilidad."
                    }
                ]
            },
            sociales: {
                name: "Estudios Sociales",
                officialTime: 4200, // 70 Minutos oficiales
                questions: [
                    {
                        q: "La Constitución de los Estados Unidos establece la separación de funciones en tres ramas independientes: Ejecutiva, Legislativa y Judicial. ¿Cuál es el propósito fundamental de esta división de poderes?",
                        options: [
                            "Acelerar los procesos de aprobación de leyes de emergencia.",
                            "Evitar la acumulación absoluta de poder y garantizar pesos y contrapesos.",
                            "Reducir los gastos operativos fijos del gobierno federal.",
                            "Asegurar que el Presidente controle las decisiones de los jueces supremos."
                        ],
                        correct: 1,
                        hint: "Piensa en el principio de balances ('checks and balances') para frenar la tiranía.",
                        exp: "La separación de poderes divide las responsabilidades del Estado para impedir que una sola entidad o persona concentre el control absoluto, protegiendo los derechos civiles mediante la fiscalización mutua."
                    },
                    {
                        q: "Una economía de libre mercado se caracteriza principalmente por cuál de las siguientes condiciones operativas:",
                        options: [
                            "Los precios de los productos básicos son fijados estrictamente por decretos gubernamentales.",
                            "El gobierno es dueño absoluto de todos los medios de producción y tierras.",
                            "Los precios se determinan mediante las interacciones de la oferta y la demanda.",
                            "Se prohíbe por completo el comercio internacional con otros países."
                        ],
                        correct: 2,
                        hint: "En el libre mercado manda la ley de los compradores y los vendedores sin intervención centralizada.",
                        exp: "En los sistemas de libre mercado o capitalistas, la fijación de precios, bienes y salarios se regula mediante la ley natural de la oferta y la demanda competitiva."
                    }
                ]
            }
        };

        let activeSubject = 'matematicas';
        let questionIdx = 0;
        let cumulativeScore = 0;
        let countdownTimer = null;
        let secondsRemaining = 0;
        let isQuestionAnswered = false;

        function loadQuizState() {
            questionIdx = 0;
            cumulativeScore = 0;
            isQuestionAnswered = false;
            secondsRemaining = gedDatabase[activeSubject].officialTime;
            
            document.getElementById('next-btn').disabled = true;
            document.getElementById('next-btn').textContent = "Siguiente Pregunta";
            document.getElementById('explanation-box').style.display = "none";
            
            clearInterval(countdownTimer);
            initTimerLogic();
            displayCurrentQuestion();
        }

        function changeSubject(subjectKey) {
            activeSubject = subjectKey;
            
            // Actualizar pestañas
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${subjectKey}`).classList.add('active');
            
            // Actualizar título informativo
            document.getElementById('module-indicator').textContent = `Módulo Activo: ${gedDatabase[subjectKey].name}`;
            
            loadQuizState();
        }

        function initTimerLogic() {
            refreshTimerText();
            countdownTimer = setInterval(() => {
                secondsRemaining--;
                refreshTimerText();
                if(secondsRemaining <= 0) {
                    clearInterval(countdownTimer);
                    terminateQuiz(true);
                }
            }, 1000);
        }

        function refreshTimerText() {
            const mins = Math.floor(secondsRemaining / 60);
            const secs = secondsRemaining % 60;
            document.getElementById('time-display').textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function displayCurrentQuestion() {
            const subjectQuestions = gedDatabase[activeSubject].questions;
            const currentData = subjectQuestions[questionIdx];
            
            document.getElementById('question-counter').textContent = `Pregunta ${questionIdx + 1} de ${subjectQuestions.length}`;
            document.getElementById('question-text').textContent = currentData.q;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            document.getElementById('explanation-box').style.display = "none";
            isQuestionAnswered = false;
            document.getElementById('next-btn').disabled = true;

            currentData.options.forEach((optionText, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = optionText;
                button.onclick = () => evaluateSelection(index, button);
                optionsContainer.appendChild(button);
            });
        }

        function evaluateSelection(selectedIndex, targetButton) {
            if(isQuestionAnswered) return;
            isQuestionAnswered = true;
            
            const subjectQuestions = gedDatabase[activeSubject].questions;
            const currentData = subjectQuestions[questionIdx];
            const allOptionButtons = document.querySelectorAll('.option-btn');
            
            allOptionButtons.forEach(btn => btn.disabled = true);

            if(selectedIndex === currentData.correct) {
                targetButton.classList.add('correct');
                cumulativeScore++;
            } else {
                targetButton.classList.add('wrong');
                allOptionButtons[currentData.correct].classList.add('correct');
            }

            document.getElementById('explanation-text').textContent = currentData.exp;
            document.getElementById('explanation-box').style.display = "block";
            
            if(questionIdx === subjectQuestions.length - 1) {
                document.getElementById('next-btn').textContent = "Ver Resultados del Módulo";
            }
            document.getElementById('next-btn').disabled = false;
        }

        function triggerHint() {
            const currentData = gedDatabase[activeSubject].questions[questionIdx];
            alert(`💡 PISTA:\n${currentData.hint}`);
        }

        function goToNextQuestion() {
            const subjectQuestions = gedDatabase[activeSubject].questions;
            if(questionIdx < subjectQuestions.length - 1) {
                questionIdx++;
                displayCurrentQuestion();
            } else {
                clearInterval(countdownTimer);
                terminateQuiz(false);
            }
        }

        function terminateQuiz(endedByTimeout) {
            const totalQuestions = gedDatabase[activeSubject].questions.length;
            const finalPercentage = Math.round((cumulativeScore / totalQuestions) * 100);
            
            let statusMessage = finalPercentage >= 70 ? "¡Excelente! Estás demostrando un nivel óptimo para aprobar este módulo oficial." : "Te recomendamos revisar los análisis de respuesta para reforzar tus puntos débiles.";
            if(endedByTimeout) statusMessage = "⏰ ¡El tiempo límite oficial establecido ha concluido!";

            document.getElementById('quiz-playable-zone').innerHTML = `
                <div class="results-screen">
                    <h2>Módulo Concluido</h2>
                    <p style="margin: 15px 0; font-size: 1.1rem; color: #4b5563;">${statusMessage}</p>
                    <div class="score-box">${finalPercentage}%</div>
                    <p style="font-size: 1.1rem; font-weight: 600;">Puntuación final: Respondiste correctamente ${cumulativeScore} de ${totalQuestions} reactivos.</p>
                    <button class="action-btn" style="margin-top: 25px; padding: 15px 30px; background-color: #1a1a1a; color: white;" onclick="loadQuizState()">Reiniciar Módulo</button>
                </div>
            `;
        }

        // Carga automática inicial al abrir el navegador
        window.onload = loadQuizState;
    </script>
</body>
</html>
