<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Completo GED - 4 Materias</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-dark: #1a1a1a;
            --border-dark: #1a1a1a;
            --card-bg: #ffffff;
            
            --math-color: #ffda79;
            --rla-color: #ffabe7;
            --science-color: #81ecec;
            --social-color: #74b9ff;
            
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border: 4px solid var(--border-dark);
            padding: 20px;
            background: #ffffff;
            box-shadow: 6px 6px 0px var(--border-dark);
        }

        .header h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background: #ffffff;
            border: 4px solid var(--border-dark);
            padding: 15px 10px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.1s ease;
        }

        .tab-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px var(--border-dark);
        }

        #btn-matematicas.active { background-color: var(--math-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
        #btn-lenguaje.active { background-color: var(--rla-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
        #btn-ciencias.active { background-color: var(--science-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }
        #btn-sociales.active { background-color: var(--social-color); transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--border-dark); }

        .quiz-panel {
            background: var(--card-bg);
            border: 4px solid var(--border-dark);
            padding: 30px;
            box-shadow: 8px 8px 0px var(--border-dark);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--border-dark);
            padding-bottom: 15px;
            margin-bottom: 25px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 1rem;
        }

        .timer {
            color: var(--danger);
            background: #fee2e2;
            padding: 4px 10px;
            border: 2px solid var(--border-dark);
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 25px;
            white-space: pre-line;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-btn {
            background: #ffffff;
            border: 3px solid var(--border-dark);
            padding: 15px 20px;
            text-align: left;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-dark);
            transition: all 0.1s ease;
        }

        .option-btn:hover:not([disabled]) {
            background: #fdfbf7;
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px var(--border-dark);
        }

        .option-btn.correct {
            background-color: var(--success) !important;
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--danger) !important;
            color: white;
        }

        .explanation-box {
            margin-top: 25px;
            padding: 20px;
            background: #f0fdf4;
            border: 3px solid var(--border-dark);
            box-shadow: 4px 4px 0px var(--border-dark);
            display: none;
            line-height: 1.5;
        }

        .actions-row {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .action-btn {
            background: #ffffff;
            border: 3px solid var(--border-dark);
            padding: 12px 25px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--border-dark);
        }

        .action-btn:hover:not([disabled]) {
            background: #f4f1ea;
        }

        .action-btn:disabled {
            background: #e2e8f0;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: 0px 0px 0px;
            transform: translate(4px, 4px);
        }

        /* Contenedor de resultados (inicialmente oculto) */
        #results-container {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .score-box {
            display: inline-block;
            padding: 20px 40px;
            border: 4px solid var(--border-dark);
            background: var(--math-color);
            font-size: 3rem;
            font-weight: 900;
            box-shadow: 6px 6px 0px var(--border-dark);
            margin: 20px 0;
        }

        /* Ocultar sección de preguntas cuando se muestran los resultados */
        #quiz-content.hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Simulador Oficial GED</h1>
            <p id="module-indicator">Módulo Activo: Razonamiento Matemático</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btn-matematicas" onclick="changeSubject('matematicas')">Matemáticas</button>
            <button class="tab-btn" id="btn-lenguaje" onclick="changeSubject('lenguaje')">Artes del Lenguaje</button>
            <button class="tab-btn" id="btn-ciencias" onclick="changeSubject('ciencias')">Ciencias</button>
            <button class="tab-btn" id="btn-sociales" onclick="changeSubject('sociales')">Estudios Sociales</button>
        </div>

        <div class="quiz-panel">
            <div class="status-bar">
                <span id="question-counter">Pregunta 1 de 30</span>
                <span class="timer">⏱️ Tiempo: <span id="time-display">00:00</span></span>
            </div>

            <div id="quiz-playable-zone">
                <!-- Contenido de preguntas -->
                <div id="quiz-content">
                    <p class="question-text" id="question-text">Cargando reactivos oficiales...</p>
                    <div class="options-list" id="options-container"></div>

                    <div class="explanation-box" id="explanation-box">
                        <strong>Análisis del Reactivo:</strong> <span id="explanation-text"></span>
                    </div>

                    <div class="actions-row">
                        <button class="action-btn" id="hint-btn" onclick="triggerHint()">Ver Pista</button>
                        <button class="action-btn" id="next-btn" onclick="goToNextQuestion()" disabled>Siguiente Pregunta</button>
                    </div>
                </div>

                <!-- Contenedor de resultados (oculto por defecto) -->
                <div id="results-container">
                    <h2>Módulo Concluido con Éxito</h2>
                    <p>Has completado todos los reactivos asignados a esta materia.</p>
                    <div class="score-box" id="final-score">0 / 0</div>
                    <p>Respuestas correctas logradas.</p>
                    <br>
                    <button class="action-btn" onclick="restartSubject()">Reintentar Materia</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // BASE DE DATOS GLOBAL DEL SIMULADOR
        // ==========================================
        const gedDatabase = {
            matematicas: {
                name: "Razonamiento Matemático",
                officialTime: 6900, // 115 Minutos
                questions: [
                    {
                        q: "1. Si un tanque de agua de forma cilíndrica tiene un radio de 3 metros y una altura de 5 metros, ¿cuál es su volumen aproximado en metros cúbicos? (Usa π ≈ 3.14)",
                        options: ["A) 45.12 m³", "B) 141.30 m³", "C) 282.60 m³", "D) 70.65 m³"],
                        correct: 1,
                        hint: "La fórmula para el volumen de un cilindro es V = π * r² * h.",
                        exp: "Multiplicando el radio al cuadrado (3² = 9) por la altura (5) obtenemos 45. Al multiplicar 45 por π (3.14) el resultado es 141.30 m³."
                    },
                    {
                        q: "2. Resuelve la siguiente ecuación lineal para 'x': 4x - 7 = 2x + 9",
                        options: ["A) x = 1", "B) x = 4", "C) x = 8", "D) x = 16"],
                        correct: 2,
                        hint: "Agrupa los términos con 'x' de un lado de la igualdad y los números del otro.",
                        exp: "Restamos 2x a ambos lados: 2x - 7 = 9. Sumamos 7 a ambos lados: 2x = 16. Dividiendo entre 2, x = 8."
                    },
                    {
                        q: "3. Un artículo de tecnología cuesta $120. Si se le aplica un descuento del 15%, ¿cuánto se pagará finalmente por el artículo?",
                        options: ["A) $102", "B) $105", "C) $108", "D) $112"],
                        correct: 0,
                        hint: "Calcula el 15% de 120 multiplicando 120 por 0.15 y réstalo al precio original.",
                        exp: "El 15% de 120 es (120 * 0.15) = 18. Restando el descuento del precio original: 120 - 18 = $102."
                    },
                    {
                        q: "4. ¿Cuál es la pendiente (m) de la recta que pasa por los puntos A(2, 3) y B(5, 12)?",
                        options: ["A) m = 2", "B) m = 3", "C) m = 4", "D) m = 5"],
                        correct: 1,
                        hint: "Utiliza la fórmula de la pendiente: m = (y2 - y1) / (x2 - x1).",
                        exp: "m = (12 - 3) / (5 - 2) = 9 / 3 = 3. La pendiente de la recta es 3."
                    },
                    {
                        q: "5. Factoriza por completo la siguiente expresión cuadrática: x² - 9x + 20",
                        options: ["A) (x - 4)(x - 5)", "B) (x + 4)(x + 5)", "C) (x - 2)(x - 10)", "D) (x + 2)(x - 10)"],
                        correct: 0,
                        hint: "Busca dos números que multiplicados den 20 y sumados algebraicamente den -9.",
                        exp: "Los números -4 y -5 cumplen las condiciones: (-4)(-5) = 20 y (-4) + (-5) = -9. Por lo tanto, la factorización es (x - 4)(x - 5)."
                    },
                    {
                        q: "6. Si la razón entre dos números es de 3:5 y el menor de ellos es 24, ¿cuál es el valor del número mayor?",
                        options: ["A) 36", "B) 40", "C) 48", "D) 60"],
                        correct: 1,
                        hint: "Establece una proporción matemática: 3/5 = 24/x y resuelve para x.",
                        exp: "Multiplicando en cruz: 3 * x = 5 * 24 => 3x = 120 => x = 120 / 3 = 40."
                    },
                    {
                        q: "7. Un triángulo rectángulo cuenta con un cateto de 6 cm y una hipotenusa de 10 cm. ¿Cuánto mide el cateto restante?",
                        options: ["A) 4 cm", "B) 7 cm", "C) 8 cm", "D) 9 cm"],
                        correct: 2,
                        hint: "Aplica el Teorema de Pitágoras: a² + b² = c².",
                        exp: "6² + b² = 10² => 36 + b² = 100 => b² = 64 => b = √64 = 8 cm."
                    },
                    {
                        q: "8. Un estudiante obtuvo las siguientes calificaciones en sus exámenes parciales: 85, 90, 78, 92 y 85. ¿Cuál es la mediana de sus notas?",
                        options: ["A) 85", "B) 86", "C) 78", "D) 90"],
                        correct: 0,
                        hint: "Ordena los datos de menor a mayor y localiza el valor que queda exactamente en medio.",
                        exp: "Datos ordenados: 78, 85, 85, 90, 92. El valor central es 85."
                    },
                    {
                        q: "9. Evalúa la siguiente expresión algebraica si se sabe que a = -3 y b = 4:\n3a² - 2b + 5",
                        options: ["A) 14", "B) 24", "C) -30", "D) 32"],
                        correct: 1,
                        hint: "Sustituye los valores respetando las leyes de los signos y la jerarquía de operaciones.",
                        exp: "3(-3)² - 2(4) + 5 = 3(9) - 8 + 5 = 27 - 8 + 5 = 24."
                    },
                    {
                        q: "10. ¿Cuál es el área total de una lona circular cuyo diámetro mide 14 metros? (Usa π ≈ 3.14)",
                        options: ["A) 615.44 m²", "B) 153.86 m²", "C) 43.96 m²", "D) 76.93 m²"],
                        correct: 1,
                        hint: "Primero encuentra el radio (mitad del diámetro) y luego aplica la fórmula A = π * r².",
                        exp: "El radio es 7 m. El área es 3.14 * (7²) = 3.14 * 49 = 153.86 m²."
                    },
                    {
                        q: "11. En una urna hay 4 canicas rojas, 5 azules y 3 verdes. Si se extrae una canica al azar, ¿cuál es la probabilidad de que esta sea verde?",
                        options: ["A) 1/4", "B) 1/3", "C) 5/12", "D) 1/2"],
                        correct: 0,
                        hint: "Divide los casos favorables (verdes) entre el total de casos posibles.",
                        exp: "Total de canicas = 4 + 5 + 3 = 12. Verdes = 3. Probabilidad = 3/12, que simplificado equivale a 1/4."
                    },
                    {
                        q: "12. Encuentra los valores de 'x' que satisfacen la siguiente ecuación cuadrática utilizando factorización: x² - 16 = 0",
                        options: ["A) x = 4", "B) x = -4", "C) x = 4 y x = -4", "D) x = 8 y x = -8"],
                        correct: 2,
                        hint: "Se trata de una diferencia de cuadrados perfectos: (x - a)(x + a) = 0.",
                        exp: "x² - 16 = 0 => (x - 4)(x + 4) = 0. Al igualar cada factor a cero obtenemos x = 4 y x = -4."
                    },
                    {
                        q: "13. Si 8 constructores terminan una barda perimetral en 6 días, ¿cuánto tiempo tardarán 12 constructores en hacer el mismo trabajo si mantienen el mismo ritmo?",
                        options: ["A) 9 días", "B) 4 días", "C) 3 días", "D) 5 días"],
                        correct: 1,
                        hint: "Es una relación de proporcionalidad inversa: a más trabajadores, menos días de trabajo.",
                        exp: "Multiplicamos los datos iniciales: 8 * 6 = 48. Dividimos entre la nueva cantidad de constructores: 48 / 12 = 4 días."
                    },
                    {
                        q: "14. Simplifica la siguiente expresión matemática combinando términos semejantes:\n5x - 3y + 2x - 8 + 7y",
                        options: ["A) 7x + 4y - 8", "B) 3x - 10y - 8", "C) 7x - 4y + 8", "D) 11x - 8"],
                        correct: 0,
                        hint: "Suma los términos con 'x' por un lado y los términos con 'y' por el otro.",
                        exp: "(5x + 2x) + (-3y + 7y) - 8 = 7x + 4y - 8."
                    },
                    {
                        q: "15. ¿Qué número sigue en la secuencia lógica presentada: 3, 7, 15, 31, 63, ...?",
                        options: ["A) 95", "B) 126", "C) 127", "D) 129"],
                        correct: 2,
                        hint: "Observa el patrón aritmético: cada término se duplica y se le suma 1 (2n + 1).",
                        exp: "Siguiendo la regla lógica: (63 * 2) + 1 = 126 + 1 = 127."
                    },
                    {
                        q: "16. Un terreno con forma rectangular mide 25 metros de largo. Si su perímetro total es de 80 metros, ¿cuál es el ancho de dicho terreno?",
                        options: ["A) 15 metros", "B) 30 metros", "C) 12.5 metros", "D) 20 metros"],
                        correct: 0,
                        hint: "La fórmula del perímetro es P = 2(largo) + 2(ancho).",
                        exp: "80 = 2(25) + 2(ancho) => 80 = 50 + 2(ancho) => 30 = 2(ancho) => ancho = 15 metros."
                    },
                    {
                        q: "17. ¿Cuál es el valor numérico de la expresión algebraica (2x)³ cuando x = -2?",
                        options: ["A) -24", "B) 64", "C) -64", "D) -12"],
                        correct: 2,
                        hint: "Resuelve primero la operación interna del paréntesis y luego elévala a la potencia cubo.",
                        exp: "Multiplicamos primero: 2 * (-2) = -4. Elevamos al cubo: (-4)³ = (-4) * (-4) * (-4) = -64."
                    },
                    {
                        q: "18. Expresa la fracción 7/8 en su representación de valor decimal.",
                        options: ["A) 0.78", "B) 0.825", "C) 0.85", "D) 0.875"],
                        correct: 3,
                        hint: "Realiza la división directa del numerador entre el denominador (7 ÷ 8).",
                        exp: "Efectuando la división matemática: 7 dividido entre 8 resulta exactamente en 0.875."
                    },
                    {
                        q: "19. Resuelve el siguiente sistema de ecuaciones lineales por el método que prefieras y halla el valor de 'y':\nx + y = 10\nx - y = 4",
                        options: ["A) y = 7", "B) y = 3", "C) y = 6", "D) y = 2"],
                        correct: 1,
                        hint: "Puedes restar la segunda ecuación de la primera para eliminar 'x'.",
                        exp: "(x + y) - (x - y) = 10 - 4 => 2y = 6 => y = 3."
                    },
                    {
                        q: "20. Una tienda departamental ofrece una estufa en $450 a crédito, pero tiene un recargo del 8% de interés sobre el precio original. ¿Cuánto dinero extra se pagará por concepto de intereses?",
                        options: ["A) $36", "B) $45", "C) $54", "D) $32"],
                        correct: 0,
                        hint: "Multiplica el valor total de $450 por 0.08 para calcular el recargo directo.",
                        exp: "Interés = 450 * 0.08 = $36 extras."
                    },
                    {
                        q: "21. ¿Cuál de las siguientes desigualdades numéricas representa de forma correcta la frase: 'El triple de un número aumentado en 5 es menor o igual que 26'?",
                        options: ["A) 3x + 5 < 26", "B) 3x + 5 ≤ 26", "C) 3(x + 5) ≤ 26", "D) 3x - 5 ≥ 26"],
                        correct: 1,
                        hint: "Identifica el lenguaje matemático: 'triple' es 3x, 'aumentado' es +, y 'menor o igual' es ≤.",
                        exp: "Traduciendo término a término: 'El triple de un número' (3x), 'aumentado en 5' (+ 5), 'es menor o igual' (≤), 'que 26'. Resulta en 3x + 5 ≤ 26."
                    },
                    {
                        q: "22. Calcula la distancia geométrica lineal entre los puntos cardinales P(1, 2) y Q(5, 5) graficados en el plano cartesiano.",
                        options: ["A) 4 unidades", "B) 5 unidades", "C) 7 unidades", "D) √7 unidades"],
                        correct: 1,
                        hint: "Utiliza la fórmula de distancia entre dos puntos: d = √[(x2 - x1)² + (y2 - y1)²].",
                        exp: "d = √[(5 - 1)² + (5 - 2)²] = √[4² + 3²] = √[16 + 9] = √25 = 5 unidades."
                    },
                    {
                        q: "23. Si un ángulo interno de un triángulo mide 45 grados y el segundo mide 75 grados, ¿cuánto debe medir el tercer ángulo del triángulo?",
                        options: ["A) 50 grados", "B) 60 grados", "C) 70 grados", "D) 90 grados"],
                        correct: 1,
                        hint: "Recuerda que la propiedad fundamental de todo triángulo dicta que sus ángulos internos siempre suman 180 grados.",
                        exp: "180 - (45 + 75) = 180 - 120 = 60 grados."
                    },
                    {
                        q: "24. Una receta de cocina requiere 3/4 de taza de azúcar para hacer un pastel. Si necesitas preparar 5 pasteles iguales para un evento, ¿cuántas tazas de azúcar usarás en total?",
                        options: ["A) 3 tazas y media", "B) 3 tazas y 3/4", "C) 4 tazas", "D) 4 tazas y 1/4"],
                        correct: 1,
                        hint: "Multiplica la fracción 3/4 por el entero 5.",
                        exp: "(3/4) * 5 = 15/4. Al convertir la fracción impropia a mixta obtenemos 3 tazas enteras y 3/4 restantes."
                    },
                    {
                        q: "25. Resuelve el valor absoluto planteado en la siguiente expresión: |5 - 12| + 3",
                        options: ["A) -4", "B) 10", "C) 4", "D) -10"],
                        correct: 1,
                        hint: "El valor absoluto transforma cualquier cantidad resultante interna en un valor positivo.",
                        exp: "5 - 12 = -7. El valor absoluto |-7| es 7. Finalmente sumamos el entero restante: 7 + 3 = 10."
                    },
                    {
                        q: "26. ¿Cuál es la notación científica correcta para expresar la cantidad decimal 0.00045?",
                        options: ["A) 4.5 × 10⁴", "B) 4.5 × 10⁻⁴", "C) 45 × 10⁻⁵", "D) 0.45 × 10⁻³"],
                        correct: 1,
                        hint: "Mueve el punto decimal hacia la derecha hasta tener un número entre 1 y 10, y cuenta los saltos.",
                        exp: "El punto se desplaza 4 lugares a la derecha para obtener 4.5. Al ser un número menor a uno, el exponente es negativo: 4.5 × 10⁻⁴."
                    },
                    {
                        q: "27. Un prisma rectangular de madera tiene un largo de 4 cm, un ancho de 3 cm y una altura de 6 cm. ¿Cuál es su volumen total?",
                        options: ["A) 13 cm³", "B) 36 cm³", "C) 72 cm³", "D) 48 cm³"],
                        correct: 2,
                        hint: "El volumen de un prisma rectangular se calcula multiplicando sus tres dimensiones continuas.",
                        exp: "V = largo * ancho * altura = 4 cm * 3 cm * 6 cm = 72 cm³."
                    },
                    {
                        q: "28. Un ciclista recorre una pista a una velocidad constante de 15 kilómetros por hora. ¿Cuántos metros recorrerá en total en un lapso de 20 minutos?",
                        options: ["A) 5,000 metros", "B) 3,000 metros", "C) 4,500 metros", "D) 6,000 metros"],
                        correct: 0,
                        hint: "Convierte primero el tiempo a fracción de hora (20 minutos equivalen a 1/3 de hora) o trabaja con metros y minutos.",
                        exp: "Distancia = velocidad * tiempo. 20 min es 1/3 de hora. Distancia = 15 km/h * (1/3 h) = 5 kilómetros. Convertido a metros equivale a 5,000 m."
                    },
                    {
                        q: "29. ¿Cuál es el máximo común divisor (MCD) de los números 24 y 36?",
                        options: ["A) 6", "B) 12", "C) 4", "D) 18"],
                        correct: 1,
                        hint: "Busca el mayor número entero que divida exactamente a ambos valores al mismo tiempo.",
                        exp: "Los divisores de 24 son: 1, 2, 3, 4, 6, 8, 12, 24. Los de 36 son: 1, 2, 3, 4, 6, 9, 12, 18, 36. El mayor común es 12."
                    },
                    {
                        q: "30. Si el área superficial cuadrada de un patio mide exactamente 144 metros cuadrados, ¿cuánto mide el perímetro exterior total de dicho patio?",
                        options: ["A) 12 metros", "B) 24 metros", "C) 48 metros", "D) 96 metros"],
                        correct: 2,
                        hint: "Primero halla cuánto mide un solo lado calculando la raíz cuadrada del área.",
                        exp: "El lado del cuadrado mide √144 = 12 metros. El perímetro es la suma de sus cuatro lados iguales: 12 * 4 = 48 metros."
                    }
                ]
            },
            lenguaje: {
                name: "Artes del Lenguaje (RLA)",
                officialTime: 9000,
                questions: [

                        hint: "Afirmaba que si un gobernante rompe el contrato violando los derechos del pueblo, los ciudadanos tienen el derecho legítimo a la rebelión.",
                        exp: "Las ideas de John Locke sobre los derechos naturales a la vida, la libertad y la propiedad fueron el pilar ideológico de la Declaración de Independencia."
                    },
                    {
                        q: "30. ¿Cuál es el requisito indispensable que debe cumplir un proyecto de ley para convertirse finalmente en ley federal tras haber sido aprobado por el Senado y la Cámara de Representantes?",
                        options: ["A) Ser ratificado en referéndum por voto popular directo.", "B) Ser firmado y promulgado por el Presidente de los Estados Unidos.", "C) Contar con la recomendación unánime del Secretario de Estado.", "D) Ser publicado en los diarios de circulación masiva durante un mes."],
                        correct: 1,
                        hint: "El Presidente tiene el poder de vetarlo o firmarlo.",
                        exp: "Una vez que ambas cámaras aprueban un texto idéntico, este se envía al Presidente para su firma. Si el Presidente lo veta, el Congreso requiere una mayoría de dos tercios en ambas cámaras para anular el veto."
                    }
                ]
            }
        };

        // ==========================================
        // LÓGICA DE CONTROL DEL EXAMEN
        // ==========================================
        let currentSubject = 'matematicas';
        let currentQuestionIndex = 0;
        let score = 0;
        let timerInterval = null;
        let timeRemaining = 0;

        function changeSubject(subjectKey) {
            if (!gedDatabase[subjectKey]) return;
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${subjectKey}`).classList.add('active');
            
            currentSubject = subjectKey;
            currentQuestionIndex = 0;
            score = 0;
            
            document.getElementById('module-indicator').textContent = `Módulo Activo: ${gedDatabase[subjectKey].name}`;
            
            // Detener timer anterior
            clearInterval(timerInterval);
            timeRemaining = gedDatabase[subjectKey].officialTime;
            startTimer();
            
            // Asegurar que se muestra el contenido de preguntas y se ocultan los resultados
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('results-container').style.display = 'none';
            
            loadQuestion();
        }

        function startTimer() {
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                if (timeRemaining > 0) {
                    timeRemaining--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                    alert("¡El tiempo oficial de este módulo ha terminado!");
                    showFinalResults();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById('time-display').textContent = 
                `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function loadQuestion() {
            const subjectData = gedDatabase[currentSubject];
            const total = subjectData.questions.length;
            
            if (total === 0) {
                document.getElementById('question-text').textContent = "Contenido en desarrollo. Por favor, cargue los bancos de preguntas correspondientes.";
                document.getElementById('options-container').innerHTML = '';
                document.getElementById('question-counter').textContent = "Pregunta 0 de 0";
                return;
            }

            // Asegurar que el contenido de preguntas está visible y los resultados ocultos
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('results-container').style.display = 'none';

            const currentQuestion = subjectData.questions[currentQuestionIndex];
            
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('next-btn').disabled = true;
            
            document.getElementById('question-counter').textContent = 
                `Pregunta ${currentQuestionIndex + 1} de ${total}`;
            
            document.getElementById('question-text').textContent = currentQuestion.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            currentQuestion.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, selectedBtn) {
            const currentQuestion = gedDatabase[currentSubject].questions[currentQuestionIndex];
            const allOptions = document.querySelectorAll('.option-btn');
            
            allOptions.forEach(btn => btn.disabled = true);
            
            if (selectedIndex === currentQuestion.correct) {
                selectedBtn.classList.add('correct');
                score++;
            } else {
                selectedBtn.classList.add('wrong');
                allOptions[currentQuestion.correct].classList.add('correct');
            }
            
            document.getElementById('explanation-text').textContent = currentQuestion.exp;
            document.getElementById('explanation-box').style.display = 'block';
            
            document.getElementById('next-btn').disabled = false;
        }

        function triggerHint() {
            const subjectData = gedDatabase[currentSubject];
            if (subjectData.questions.length === 0) return;
            const currentQuestion = subjectData.questions[currentQuestionIndex];
            alert(`Pista del Reactivo:\n${currentQuestion.hint}`);
        }

        function goToNextQuestion() {
            const subjectData = gedDatabase[currentSubject];
            if (currentQuestionIndex < subjectData.questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showFinalResults();
            }
        }

        function showFinalResults() {
            clearInterval(timerInterval);
            const totalQuestions = gedDatabase[currentSubject].questions.length;
            // Ocultar contenido de preguntas, mostrar resultados
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('results-container').style.display = 'block';
            document.getElementById('final-score').textContent = `${score} / ${totalQuestions}`;
        }

        function restartSubject() {
            // Reinicia la materia actual sin recargar la página
            currentQuestionIndex = 0;
            score = 0;
            // Detener y reiniciar timer
            clearInterval(timerInterval);
            timeRemaining = gedDatabase[currentSubject].officialTime;
            startTimer();
            // Mostrar contenido y ocultar resultados
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('results-container').style.display = 'none';
            loadQuestion();
        }

        window.onload = function() {
            changeSubject('matematicas');
        };
    </script>
</body>
</html>
